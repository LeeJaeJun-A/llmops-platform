# Production overrides
replicaCount: 3

config:
  appEnv: production
  appDebug: "false"
  logLevel: warning

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60

podDisruptionBudget:
  enabled: true
  minAvailable: 2

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  # REQUIRED: Replace with your actual production domain before deploying
  hosts:
    - host: llmops.REPLACE_WITH_YOUR_DOMAIN.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: llmops-tls
      hosts:
        - llmops.REPLACE_WITH_YOUR_DOMAIN.com

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

worker:
  replicaCount: 2
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

karpenter:
  enabled: true
  clusterName: llmops-prod
  nodeRole: llmops-prod-karpenter-node
  instanceTypes:
    - m6i.large
    - m6i.xlarge
    - m6i.2xlarge
    - m5.large
    - m5.xlarge
    - m5.2xlarge
    - r6i.large
    - r6i.xlarge
  capacityTypes:
    - on-demand
    - spot
  limits:
    cpu: 200
    memory: 400Gi
  disruption:
    consolidateAfter: 60s
    consolidationPolicy: WhenEmptyOrUnderutilized
    expireAfter: 720h
    budgetNodes: "5%"

# Use secrets from AWS Secrets Manager (created by Terraform)
secrets:
  existingSecret: llmops-prod-app

# External managed databases in production
postgresql:
  enabled: false

redis:
  enabled: false

langfuse:
  enabled: true
