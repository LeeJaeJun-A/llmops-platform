{{- if .Values.karpenter.enabled }}
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: {{ include "llmops.fullname" . }}
  labels:
    {{- include "llmops.labels" . | nindent 4 }}
spec:
  role: {{ .Values.karpenter.nodeRole }}
  amiSelectorTerms:
    - alias: {{ .Values.karpenter.amiAlias }}
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.karpenter.clusterName }}
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.karpenter.clusterName }}
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: {{ .Values.karpenter.volumeSize }}
        volumeType: gp3
        deleteOnTermination: true
        encrypted: true
  metadataOptions:
    httpEndpoint: enabled
    httpProtocolIPv6: disabled
    httpPutResponseHopLimit: 2
    httpTokens: required
  tags:
    Environment: {{ .Values.config.appEnv }}
    ManagedBy: karpenter
    {{- with .Values.karpenter.tags }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
