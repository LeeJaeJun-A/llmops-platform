apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "llmops.fullname" . }}-config
  labels:
    {{- include "llmops.labels" . | nindent 4 }}
data:
  APP_ENV: {{ .Values.config.appEnv | quote }}
  APP_DEBUG: {{ .Values.config.appDebug | quote }}
  APP_HOST: "0.0.0.0"
  APP_PORT: "8000"
  OBSERVABILITY_BACKEND: {{ .Values.config.observabilityBackend | quote }}
  LANGFUSE_HOST: {{ .Values.config.langfuseHost | quote }}
  RATE_LIMIT_REQUESTS_PER_MINUTE: {{ .Values.config.rateLimitRequestsPerMinute | quote }}
