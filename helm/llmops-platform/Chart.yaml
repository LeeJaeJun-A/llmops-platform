apiVersion: v2
name: llmops-platform
description: LLMOps Platform — scoring, tuning, prompt management, observability
type: application
version: 0.1.0
appVersion: "0.1.0"

dependencies:
  - name: langfuse
    version: "~1.0.0"
    repository: "https://langfuse.github.io/langfuse-k8s"
    condition: langfuse.enabled

  - name: postgresql
    version: "~16.0.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled

  - name: redis
    version: "~20.0.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
